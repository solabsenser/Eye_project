<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gaze OS</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#050510;
    font-family:Arial;
}

video{
    position:absolute;
    width:100vw;
    height:100vh;
    object-fit:cover;
    opacity:0.18;
    transform:scaleX(-1);
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
}

.title{
    position:absolute;
    top:30px;
    width:100%;
    text-align:center;
    font-size:42px;
    color:white;
    letter-spacing:4px;
}

.menu{
    position:absolute;
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:40px;
    padding:140px;
    box-sizing:border-box;
}

.card{
    background:rgba(255,255,255,0.06);
    border:2px solid rgba(255,255,255,0.12);
    border-radius:35px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:42px;
    color:white;

    backdrop-filter:blur(20px);

    transition:0.25s;
}

.card.focused{
    transform:scale(1.05);
    border-color:#00ffd5;

    box-shadow:
        0 0 40px rgba(0,255,213,0.5);
}

#gazeCursor{
    position:absolute;

    width:28px;
    height:28px;

    border-radius:50%;

    background:#ff00ff;

    box-shadow:
        0 0 25px #ff00ff,
        0 0 50px #ff00ff;

    pointer-events:none;

    transform:translate(-50%, -50%);
}

</style>

</head>

<body>

<video id="webcam" autoplay playsinline></video>

<div class="overlay">

    <div class="title">
        GAZE OS
    </div>

    <div class="menu">

        <div class="card">MESSAGES</div>
        <div class="card">AI</div>
        <div class="card">MUSIC</div>
        <div class="card">MAPS</div>

    </div>

    <div id="gazeCursor"></div>

</div>

<script>

const video = document.getElementById("webcam")
const cursor = document.getElementById("gazeCursor")

// Камера
navigator.mediaDevices.getUserMedia({
    video:true
})
.then(stream => {
    video.srcObject = stream
})

// ДЕМО gaze cursor
let x = window.innerWidth / 2
let y = window.innerHeight / 2

setInterval(() => {

    x += (Math.random() - 0.5) * 50
    y += (Math.random() - 0.5) * 50

    x = Math.max(0, Math.min(window.innerWidth, x))
    y = Math.max(0, Math.min(window.innerHeight, y))

    cursor.style.left = x + "px"
    cursor.style.top = y + "px"

    // Hover cards
    document.querySelectorAll(".card").forEach(card => {

        const rect = card.getBoundingClientRect()

        if(
            x > rect.left &&
            x < rect.right &&
            y > rect.top &&
            y < rect.bottom
        ){
            card.classList.add("focused")
        }
        else{
            card.classList.remove("focused")
        }

    })

}, 30)

</script>

</body>
</html>
