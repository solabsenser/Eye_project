<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaze OS</title>

    <style>

        body{
            margin:0;
            background:black;
            color:white;
            font-family:Arial;
            overflow:hidden;
        }

        .title{
            position:absolute;
            top:40px;
            width:100%;
            text-align:center;
            font-size:40px;
            color:#00ffcc;
        }

        .menu{
            position:absolute;
            width:100%;
            height:100%;
            display:grid;
            grid-template-columns:1fr 1fr;
            grid-template-rows:1fr 1fr;
            gap:30px;
            padding:120px;
            box-sizing:border-box;
        }

        .card{
            background:#111;
            border:3px solid #00ffcc;
            border-radius:30px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
            transition:0.2s;
        }

        .card:hover{
            background:#00ffcc;
            color:black;
            transform:scale(1.05);
        }

    </style>

</head>
<body>

    <div class="title">
        GAZE OS
    </div>

    <div class="menu">

        <div class="card">MESSAGES</div>
        <div class="card">AI</div>
        <div class="card">MUSIC</div>
        <div class="card">MAPS</div>

    </div>

</body>
</html>
